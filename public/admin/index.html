<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Yttertavle Bygdegård - Admin</title>
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "Simskii/yttertavle.se",
            branch: "main",
            base_url: "https://api.netlify.com",
            site_id: "yttertavle.netlify.app",
          },
          media_folder: "public/images/uploads",
          public_folder: "/images/uploads",
          locale: "sv",
          collections: [
            {
              name: "nyheter",
              label: "Nyheter",
              folder: "src/content/nyheter",
              create: true,
              slug: "{{slug}}",
              fields: [
                { label: "Titel", name: "title", widget: "string" },
                { label: "Datum", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false },
                { label: "Sammanfattning", name: "excerpt", widget: "text" },
                { label: "Bild", name: "image", widget: "image", required: false },
                { label: "Kategori", name: "category", widget: "select", options: [
                  { label: "Nyheter", value: "nyheter" },
                  { label: "Verksamhet", value: "verksamhet" },
                  { label: "Styrelse", value: "styrelse" },
                  { label: "Underhåll", value: "underhall" },
                ], default: "nyheter" },
                { label: "Författare", name: "author", widget: "string", default: "Styrelsen" },
                { label: "Utkast", name: "draft", widget: "boolean", default: false },
                { label: "Innehåll", name: "body", widget: "markdown" },
              ],
            },
            {
              name: "evenemang",
              label: "Evenemang",
              folder: "src/content/evenemang",
              create: true,
              slug: "{{slug}}",
              fields: [
                { label: "Titel", name: "title", widget: "string" },
                { label: "Datum", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false },
                { label: "Tid", name: "time", widget: "string", hint: "T.ex. 18:00 - 21:00" },
                { label: "Plats", name: "location", widget: "string", default: "Yttertavle Bygdegård" },
                { label: "Sammanfattning", name: "excerpt", widget: "text" },
                { label: "Bild", name: "image", widget: "image", required: false },
                { label: "Pris", name: "price", widget: "string", required: false, hint: "T.ex. 50 kr/person eller Gratis" },
                { label: "Arrangör", name: "organizer", widget: "string", required: false },
                { label: "Utkast", name: "draft", widget: "boolean", default: false },
                { label: "Innehåll", name: "body", widget: "markdown" },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
